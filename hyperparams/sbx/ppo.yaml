# Reference: https://github.com/DLR-RM/rl-baselines3-zoo/blob/27e081eb24419ee843ae1c329b0482db823c9fc1/hyperparams/ppo.yml
policy: "MlpPolicy"
n_timesteps: 500000000
batch_size: 256
n_steps: 512
gamma: 0.99
learning_rate: lin_5e-5
ent_coef: 0.002
clip_range: 0.3
n_epochs: 8
gae_lambda: 0.9
max_grad_norm: 2
vf_coef: 0.4
