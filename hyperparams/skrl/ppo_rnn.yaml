seed: 42

# https://skrl.readthedocs.io/en/latest/api/utils/model_instantiators.html
models:
  separate: True
  policy:
    class: GaussianMixin
    clip_actions: False # Never enable: Clipping with SKRL causes NAN issues (done manually)
    clip_log_std: True
    min_log_std: -20.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: 'concatenate((
          STATES["state_dyn"],
          STATES["proprio"],
          STATES["proprio_dyn"],
          STATES["command"]
          ))'
        layers: [512, 256, 128]
        activations: elu
    output: ACTIONS
  value:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: 'concatenate((
          STATES["state_dyn"],
          STATES["proprio"],
          STATES["proprio_dyn"],
          STATES["command"]
          ))'
        layers: [512, 256, 128]
        activations: elu
    output: ONE

# https://skrl.readthedocs.io/en/latest/api/memories/random.html
memory:
  class: RandomMemory
  memory_size: -1

# https://skrl.readthedocs.io/en/latest/api/agents/ppo.html
agent:
  class: PPO_RNN
  rollouts: 24
  learning_epochs: 5
  mini_batches: 4
  discount_factor: 0.99
  lambda: 0.95
  learning_rate: 1.0e-03
  learning_rate_scheduler: KLAdaptiveLR
  learning_rate_scheduler_kwargs:
    kl_threshold: 0.01
  state_preprocessor: null
  state_preprocessor_kwargs: null
  value_preprocessor: RunningStandardScaler
  value_preprocessor_kwargs: null
  random_timesteps: 0
  learning_starts: 0
  grad_norm_clip: 1.0
  ratio_clip: 0.2
  value_clip: 0.2
  clip_predicted_values: True
  entropy_loss_scale: 0.005
  value_loss_scale: 1.0
  kl_threshold: 0.0
  rewards_shaper_scale: 0.6
  time_limit_bootstrap: False
  experiment:
    directory: "MISSING"
    experiment_name: ""
    write_interval: auto
    checkpoint_interval: auto
    wandb: False

# https://skrl.readthedocs.io/en/latest/api/trainers/sequential.html
trainer:
  class: SequentialTrainer
  timesteps: 1000000
  environment_info: log
